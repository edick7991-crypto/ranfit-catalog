<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Каталог кросівок</title>
</head>
<body>
    <h1>Каталог кросівок 👟</h1>

    <div>
        <h3>Nike Air Max 2026</h3>
        <img src="https://edick7991-crypto.github.io/ranfit-catalog/static/nike.jpg" width="200">
        <p>2750 грн</p>
        <button onclick="order('Nike Air Max 2026', 'https://edick7991-crypto.github.io/ranfit-catalog/static/nike.jpg')">
            Замовити
        </button>
    </div>

    <br><br>

    <div>
        <h3>Adidas Ultraboost</h3>
        <img src="https://edick7991-crypto.github.io/ranfit-catalog/static/adidas.jpg" width="200">
        <p>2600 грн</p>
        <button onclick="order('Adidas Ultraboost', 'https://edick7991-crypto.github.io/ranfit-catalog/static/adidas.jpg')">
            Замовити
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        function order(name, photo) {
            const data = {
                name: name,
                photo: photo
            };

            tg.sendData(JSON.stringify(data));

            tg.showPopup({
                title: "Замовлення створено ✅",
                message: "З вами скоро звʼяжеться менеджер.",
                buttons: [{ type: "ok" }]
            });

            tg.close();
        }
    </script>
</body>
</html>
